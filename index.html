<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERNLE — Guess the Intern of the Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --board:      #2a0808;
    --chalk:      #f5e9df;
    --chalk-dim:  #d8b3a6;
    --line:       #6b2a2a;
    --correct:    #79c99e;
    --correct-bg: #1f3b2c;
    --wrong-bg:   #3a1414;
    --amber:      #f2c14e;
    --miss:       #ff7a52;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    background-color:#4a0505;
    background-image:
      repeating-linear-gradient(135deg, rgba(0,0,0,0.09) 0px, rgba(0,0,0,0.09) 1px, transparent 1px, transparent 4px),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 5px),
      url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxNjAnIGhlaWdodD0nNjAnPgo8dGV4dCB4PSc0JyB5PScyMicgZm9udC1mYW1pbHk9J1NwYWNlIE1vbm8sIG1vbm9zcGFjZScgZm9udC1zaXplPSc3JyBmb250LXdlaWdodD0nNzAwJyBmaWxsPScjN2QwYTBhJyB0cmFuc2Zvcm09J3JvdGF0ZSgtMTQgNDAgMTgpJz5CbG9jazRQcmV6PC90ZXh0Pgo8dGV4dCB4PSc4NCcgeT0nNTInIGZvbnQtZmFtaWx5PSdTcGFjZSBNb25vLCBtb25vc3BhY2UnIGZvbnQtc2l6ZT0nNycgZm9udC13ZWlnaHQ9JzcwMCcgZmlsbD0nIzdkMGEwYScgdHJhbnNmb3JtPSdyb3RhdGUoLTE0IDEyMCA0OCknPkJsb2NrNFByZXo8L3RleHQ+Cjwvc3ZnPg==");
    background-repeat:repeat, repeat, repeat;
    background-size:5px 5px, 6px 6px, 160px 60px;
    color:var(--chalk);
    font-family:'Space Mono', monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:32px 16px 60px;
  }

  .wrap{ width:100%; max-width:640px; }

  header{ text-align:center; margin-bottom:22px; }

  h1{
    font-family:'Anton', sans-serif;
    font-size:clamp(42px, 11vw, 64px);
    letter-spacing:4px;
    margin:0;
    color:var(--chalk);
    text-shadow: 0 0 1px rgba(255,255,255,0.4), 0 3px 0 rgba(0,0,0,0.35);
    -webkit-text-stroke: 1px rgba(255,255,255,0.08);
  }

  .subtitle{
    color:var(--chalk-dim);
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-top:6px;
  }

  .scoreboard{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:18px 0 20px;
    font-size:13px;
    letter-spacing:1px;
    color:var(--chalk-dim);
  }

  .tally{
    display:flex;
    gap:4px;
  }

  .tally span{
    width:10px; height:10px;
    border:1px solid var(--line);
    border-radius:2px;
    background:rgba(255,255,255,0.03);
  }

  .tally span.filled{
    background:var(--amber);
    border-color:var(--amber);
  }

  .panel{
    background:rgba(0,0,0,0.18);
    border:1px dashed var(--line);
    border-radius:10px;
    padding:18px;
  }

  .guess-row{
    display:flex;
    gap:8px;
    position:relative;
  }

  #nameInput{
    flex:1;
    background:var(--board);
    border:1px solid var(--line);
    border-radius:6px;
    color:var(--chalk);
    font-family:'Space Mono', monospace;
    font-size:15px;
    padding:12px 14px;
    outline:none;
  }

  #nameInput:focus{ border-color:var(--amber); }

  #nameInput:disabled{ opacity:0.4; }

  button#guessBtn{
    font-family:'Anton', sans-serif;
    letter-spacing:1px;
    background:var(--amber);
    color:#1c1405;
    border:none;
    border-radius:6px;
    padding:0 22px;
    font-size:16px;
    cursor:pointer;
    transition:transform .08s ease;
  }
  button#guessBtn:hover{ transform:translateY(-1px); }
  button#guessBtn:disabled{ opacity:0.4; cursor:default; transform:none; }

  #suggestions{
    position:absolute;
    top:calc(100% + 6px);
    left:0; right:78px;
    background:#1a0808;
    border:1px solid var(--line);
    border-radius:6px;
    max-height:190px;
    overflow-y:auto;
    z-index:5;
    display:none;
  }

  #suggestions div{
    padding:10px 14px;
    cursor:pointer;
    font-size:14px;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  #suggestions div:last-child{ border-bottom:none; }
  #suggestions div:hover, #suggestions div.active{ background:rgba(242,193,78,0.16); }
  #suggestions div.disabled{ opacity:0.35; pointer-events:none; }

  .board-head, .guess-card{
    display:grid;
    grid-template-columns: 1.5fr 1fr 1fr;
    gap:8px;
  }

  .board-head{
    margin:22px 0 8px;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--chalk-dim);
    padding:0 2px;
  }

  #history{ display:flex; flex-direction:column-reverse; gap:8px; }

  .guess-card > div{
    background:var(--wrong-bg);
    border:1px solid var(--line);
    border-radius:6px;
    padding:12px 10px;
    font-size:14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    min-height:20px;
  }

  .guess-card .cell-name{
    font-weight:700;
    justify-content:flex-start;
    gap:8px;
  }

  .cell-correct{
    background:var(--correct-bg) !important;
    border-color:var(--correct) !important;
    color:var(--correct);
  }

  .arrow{ font-size:15px; opacity:0.85; }
  .arrow.up{ color:var(--miss); }
  .arrow.down{ color:var(--miss); }

  .win-banner{
    margin-top:20px;
    text-align:center;
    padding:16px;
    border:1px dashed var(--correct);
    border-radius:8px;
    background:var(--correct-bg);
    color:var(--correct);
    font-size:15px;
    display:none;
  }

  .win-banner.lose-banner{
    border-color:var(--miss);
    background:#3a231d;
    color:var(--miss);
  }
  .win-banner.lose-banner button#shareBtn{
    background:var(--miss);
    color:#210f0a;
  }
  .win-banner strong{
    display:block;
    font-family:'Anton', sans-serif;
    font-size:22px;
    letter-spacing:1px;
    margin-bottom:4px;
  }

  button#shareBtn{
    display:inline-block;
    margin-top:14px;
    font-family:'Anton', sans-serif;
    letter-spacing:1px;
    background:var(--amber);
    color:#1c1405;
    border:none;
    border-radius:6px;
    padding:10px 20px;
    font-size:14px;
    cursor:pointer;
    transition:transform .08s ease;
  }
  button#shareBtn:hover{ transform:translateY(-1px); }

  #shareConfirm{
    margin-top:8px;
    font-size:12px;
    color:var(--chalk-dim);
    min-height:16px;
  }


  @media (max-width:420px){
    .board-head span:nth-child(1){ display:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>INTERNLE</h1>
    <div class="subtitle">Guess the Barstool Intern of the Day</div>
    <div class="subtitle" id="dayLabel" style="margin-top:4px;"></div>
  </header>

  <div class="scoreboard">
    <span id="attemptLabel">ATTEMPT 0</span>
    <div class="tally" id="tally"></div>
  </div>

  <div class="panel">
    <div class="guess-row">
      <input type="text" id="nameInput" placeholder="Type an intern's name…" autocomplete="off">
      <div id="suggestions"></div>
      <button id="guessBtn">GUESS</button>
    </div>

    <div class="board-head">
      <span>Name</span><span>Role</span><span>Grade</span>
    </div>
    <div id="history"></div>
  </div>

  <div class="win-banner" id="winBanner">
    <strong id="winTitle"></strong>
    <span id="winSub"></span>
    <button id="shareBtn">SHARE RESULTS</button>
    <div id="shareConfirm"></div>
  </div>

</div>

<script>
/* ============================================================
   ROSTER — the current intern list. Edit names/roles/grades here.
   grade must be one of: "Incoming Freshman","Incoming Sophomore",
   "Incoming Junior","Incoming Senior","Graduated"
   (order matters for the up/down hint arrows)
============================================================ */
const ROSTER = [
  { name: "Sydney",  role: "Content",                  grade: "Graduated" },
  { name: "Anna",    role: "Content",                  grade: "Graduated" },
  { name: "Mia",     role: "Content",                  grade: "Graduated" },
  { name: "Devin",   role: "Post-Production",          grade: "Incoming Senior" },
  { name: "Rossman", role: "General Production",       grade: "Incoming Senior" },
  { name: "Lexie",   role: "Social",                   grade: "Graduated" },
  { name: "Block",   role: "WUB Production",           grade: "Incoming Junior" },
  { name: "Lorena",  role: "IT",                       grade: "Incoming Senior" },
  { name: "Simon",   role: "General Production",       grade: "Incoming Senior" },
  { name: "Pierce",  role: "General Production",       grade: "Incoming Senior" },
  { name: "Braun",   role: "Mostly Sports Production", grade: "Graduated" },
  { name: "Brennan", role: "Yak Production",           grade: "Graduated" },
  { name: "Nicky",   role: "Stella Blue",               grade: "Incoming Freshman" },
];

const GRADE_ORDER = ["Incoming Freshman","Incoming Sophomore","Incoming Junior","Incoming Senior","Graduated"];

/* Pick a deterministic "intern of the day" from today's date */
function getTodayIndex(){
  const d = new Date();
  const seed = Number(`${d.getFullYear()}${d.getMonth()+1}${d.getDate()}`);
  return seed % ROSTER.length;
}
const TARGET = ROSTER[getTodayIndex()];

/* Day counter for share text — day 1 is this game's launch date */
const LAUNCH_DATE = new Date(2026, 6, 10); // July 10, 2026
function getDayNumber(){
  const today = new Date();
  const startUTC = Date.UTC(LAUNCH_DATE.getFullYear(), LAUNCH_DATE.getMonth(), LAUNCH_DATE.getDate());
  const todayUTC = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.floor((todayUTC - startUTC) / 86400000) + 1;
}
const DAY_NUMBER = getDayNumber();
document.getElementById('dayLabel').textContent = `DAY #${DAY_NUMBER}`;

let guessedNames = new Set();
let guessLog = [];
let attempts = 0;
let won = false;
let lost = false;
const MAX_ATTEMPTS = 5;

const input = document.getElementById('nameInput');
const guessBtn = document.getElementById('guessBtn');
const suggestions = document.getElementById('suggestions');
const history = document.getElementById('history');
const attemptLabel = document.getElementById('attemptLabel');
const tally = document.getElementById('tally');
const winBanner = document.getElementById('winBanner');
const winTitle = document.getElementById('winTitle');
const winSub = document.getElementById('winSub');
const shareBtn = document.getElementById('shareBtn');
const shareConfirm = document.getElementById('shareConfirm');

function renderTally(){
  attemptLabel.textContent = `ATTEMPT ${attempts}/${MAX_ATTEMPTS}`;
  tally.innerHTML = '';
  for(let i=0;i<MAX_ATTEMPTS;i++){
    const s = document.createElement('span');
    if(i < attempts) s.classList.add('filled');
    tally.appendChild(s);
  }
}

function updateSuggestions(){
  const q = input.value.trim().toLowerCase();
  suggestions.innerHTML = '';
  if(!q){ suggestions.style.display = 'none'; return; }

  const matches = ROSTER.filter(i => i.name.toLowerCase().includes(q));
  if(matches.length === 0){ suggestions.style.display = 'none'; return; }

  matches.forEach(intern => {
    const row = document.createElement('div');
    row.textContent = intern.name;
    if(guessedNames.has(intern.name)) row.classList.add('disabled');
    row.addEventListener('click', () => {
      input.value = intern.name;
      suggestions.style.display = 'none';
      input.focus();
    });
    suggestions.appendChild(row);
  });
  suggestions.style.display = 'block';
}

input.addEventListener('input', updateSuggestions);
input.addEventListener('focus', updateSuggestions);
document.addEventListener('click', (e) => {
  if(!e.target.closest('.guess-row')) suggestions.style.display = 'none';
});
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') submitGuess();
});
guessBtn.addEventListener('click', submitGuess);

function gradeArrow(guessGrade, targetGrade){
  const gi = GRADE_ORDER.indexOf(guessGrade);
  const ti = GRADE_ORDER.indexOf(targetGrade);
  if(gi === ti) return null;
  return ti > gi ? 'up' : 'down';
}

function submitGuess(){
  if(won || lost) return;
  const name = input.value.trim();
  if(!name) return;

  const intern = ROSTER.find(i => i.name.toLowerCase() === name.toLowerCase());
  if(!intern){
    input.style.borderColor = 'var(--miss)';
    setTimeout(() => input.style.borderColor = '', 400);
    return;
  }
  if(guessedNames.has(intern.name)) return;

  guessedNames.add(intern.name);
  attempts++;

  const isNameCorrect = intern.name === TARGET.name;
  const isRoleCorrect = intern.role === TARGET.role;
  const isGradeCorrect = intern.grade === TARGET.grade;
  const gradeDir = isGradeCorrect ? null : gradeArrow(intern.grade, TARGET.grade);

  guessLog.push({ isNameCorrect, isRoleCorrect, isGradeCorrect, gradeDir });

  const card = document.createElement('div');
  card.className = 'guess-card';

  const nameCell = document.createElement('div');
  nameCell.className = 'cell-name' + (isNameCorrect ? ' cell-correct' : '');
  nameCell.textContent = intern.name;

  const roleCell = document.createElement('div');
  roleCell.className = isRoleCorrect ? 'cell-correct' : '';
  roleCell.textContent = intern.role;

  const gradeCell = document.createElement('div');
  gradeCell.className = isGradeCorrect ? 'cell-correct' : '';
  const gradeText = document.createElement('span');
  gradeText.textContent = intern.grade;
  gradeCell.appendChild(gradeText);
  if(!isGradeCorrect){
    const dir = gradeArrow(intern.grade, TARGET.grade);
    const arrow = document.createElement('span');
    arrow.className = 'arrow ' + dir;
    arrow.textContent = dir === 'up' ? '▲' : '▼';
    gradeCell.appendChild(arrow);
  }

  card.appendChild(nameCell);
  card.appendChild(roleCell);
  card.appendChild(gradeCell);
  history.appendChild(card);

  renderTally();
  input.value = '';
  suggestions.style.display = 'none';

  if(isNameCorrect){
    won = true;
    input.disabled = true;
    guessBtn.disabled = true;
    winTitle.textContent = "That's today's intern!";
    winSub.textContent = `Nailed it in ${attempts} guess${attempts === 1 ? '' : 'es'}.`;
    winBanner.style.display = 'block';
  } else if(attempts >= MAX_ATTEMPTS){
    lost = true;
    input.disabled = true;
    guessBtn.disabled = true;
    winBanner.classList.add('lose-banner');
    winTitle.textContent = "Out of guesses";
    winSub.textContent = `Today's intern was ${TARGET.name}.`;
    winBanner.style.display = 'block';
  }
}

function buildShareText(){
  const lines = guessLog.map(g => {
    const nameSq = g.isNameCorrect ? '🟩' : '⬛';
    const roleSq = g.isRoleCorrect ? '🟩' : '⬛';
    let gradeSq;
    if(g.isGradeCorrect) gradeSq = '🟩';
    else gradeSq = g.gradeDir === 'up' ? '🔺' : '🔻';
    return nameSq + roleSq + gradeSq;
  });
  const scoreText = won ? `${attempts}/${MAX_ATTEMPTS}` : `X/${MAX_ATTEMPTS}`;
  return `INTERNLE #${DAY_NUMBER} ${scoreText}\n\n${lines.join('\n')}\n\nhttps://stool-games.github.io/Internle`;
}

shareBtn.addEventListener('click', async () => {
  const text = buildShareText();
  try{
    await navigator.clipboard.writeText(text);
    shareConfirm.textContent = 'Copied to clipboard — go paste it wherever.';
  }catch(err){
    // Fallback for browsers/contexts that block the Clipboard API
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try{
      document.execCommand('copy');
      shareConfirm.textContent = 'Copied to clipboard — go paste it wherever.';
    }catch(e){
      shareConfirm.textContent = 'Could not copy automatically — select the text manually.';
    }
    document.body.removeChild(ta);
  }
});

renderTally();
</script>
</body>
</html>
